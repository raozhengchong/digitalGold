# Fashion Starter — 全栈 Docker Compose（基础设施 + Medusa + Storefront）
#
# 快速开始：
#   cp .env.docker.example .env
#   # 编辑 .env，至少配置 NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY、STRIPE 等
#   docker compose up -d --build
#
# 仅启动后端（基础设施 + Medusa）：
#   docker compose up -d --build medusa
#
# 仅启动基础设施（本地 yarn dev 时用）：
#   docker compose up -d postgres redis minio createbuckets meilisearch

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa
    volumes:
      - medusa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    ports:
      - "9090:9000"
      - "9001:9001"
    volumes:
      - medusa-minio-data:/data
    environment:
      MINIO_ROOT_USER: medusaminio
      MINIO_ROOT_PASSWORD: medusaminio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 medusaminio medusaminio;
      /usr/bin/mc mb myminio/medusa --ignore-existing;
      /usr/bin/mc anonymous set public myminio/medusa;
      exit 0;
      "

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-yoursecretmasterkey}

  medusa:
    build:
      context: ./medusa
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:9000}
        STOREFRONT_URL: ${STOREFRONT_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "${MEDUSA_PORT:-9000}:9000"
    environment:
      NODE_ENV: ${MEDUSA_NODE_ENV:-development}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:9000}
      STOREFRONT_URL: ${STOREFRONT_URL:-http://localhost:8000}
      STORE_CORS: ${STORE_CORS:-http://localhost:8000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:9000}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medusa?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      MEDUSA_COOKIE_SECURE: ${MEDUSA_COOKIE_SECURE:-}
      MEDUSA_COOKIE_SAME_SITE: ${MEDUSA_COOKIE_SAME_SITE:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      S3_FILE_URL: ${S3_FILE_URL:-http://localhost:9090/medusa}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-medusaminio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-medusaminio}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-medusa}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Agilo <noreply@agilo.com>}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-yoursecretmasterkey}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-yoursecretmasterkey}

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-us}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
        NEXT_PUBLIC_FEATURE_SEARCH_ENABLED: ${NEXT_PUBLIC_FEATURE_SEARCH_ENABLED:-true}
        NEXT_PUBLIC_SEARCH_ENDPOINT: ${NEXT_PUBLIC_SEARCH_ENDPOINT:-http://localhost:7700}
        NEXT_PUBLIC_SEARCH_API_KEY: ${NEXT_PUBLIC_SEARCH_API_KEY:-}
        NEXT_PUBLIC_ENABLE_WEBMCP: ${NEXT_PUBLIC_ENABLE_WEBMCP:-}
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://host.docker.internal:9000}
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-supersecret}
      MEDUSA_BACKEND_URL: http://medusa:9000
      STOREFRONT_COOKIE_SECURE: ${STOREFRONT_COOKIE_SECURE:-}
      STOREFRONT_COOKIE_SAME_SITE: ${STOREFRONT_COOKIE_SAME_SITE:-}

volumes:
  medusa-postgres-data:
  medusa-minio-data:
  meili-data:
